{% extends 'base.html' %}
{% block title %}My Doctor — Changer le mot de passe{% endblock %}
{% block content %}
<div class="page-header"><div class="container">
  <h1><i class="bi bi-key me-2"></i>Changer le mot de passe</h1>
  <p>Modifiez votre mot de passe de connexion</p>
</div></div>
<div class="container py-4">
<div class="row justify-content-center">
<div class="col-md-6">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="POST">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-medium">Mot de passe actuel</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="current_password" id="cp"
                   class="form-control" required>
            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePass('cp',this)"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <hr>
        <div class="mb-3">
          <label class="form-label fw-medium">Nouveau mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
            <input type="password" name="new_password" id="np"
                   class="form-control" minlength="6" required>
            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePass('np',this)"><i class="bi bi-eye"></i></button>
          </div>
          <small class="text-muted">Minimum 6 caractères</small>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Confirmer</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
            <input type="password" name="confirm_password" id="cfp"
                   class="form-control" minlength="6" required>
            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePass('cfp',this)"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-semibold">
            <i class="bi bi-save me-2"></i>Enregistrer
          </button>
          <a href="{% url 'profile' %}" class="btn btn-outline-secondary px-4">
            Annuler
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
</div>
</div>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
