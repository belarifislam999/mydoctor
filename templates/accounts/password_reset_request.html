{% extends 'base.html' %}
{% block title %}My Doctor — Mot de passe oublié{% endblock %}
{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center" style="min-height:80vh">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">
  <div class="auth-card card border-0 shadow-sm p-4">
    <div class="text-center mb-4">
      <div class="auth-icon mb-3">
        <i class="bi bi-envelope-open fs-1 text-primary"></i>
      </div>
      <h3 class="fw-bold">Mot de passe oublié</h3>
      <p class="text-muted">Entrez votre email pour recevoir un code de réinitialisation</p>
    </div>

    <form method="POST">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-medium">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope text-primary"></i></span>
          <input type="email" name="email" class="form-control"
                 placeholder="votre@email.com" required autofocus>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-send me-2"></i>Envoyer le code
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'login' %}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Retour à la connexion
      </a>
    </div>
  </div>
</div>
</div>
</div>
</div>
{% endblock %}
