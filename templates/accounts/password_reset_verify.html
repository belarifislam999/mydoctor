{% extends 'base.html' %}
{% block title %}My Doctor — Vérification{% endblock %}
{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center" style="min-height:80vh">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">
  <div class="auth-card card border-0 shadow-sm p-4">
    <div class="text-center mb-4">
      <div class="auth-icon mb-3">
        <i class="bi bi-shield-lock fs-1 text-primary"></i>
      </div>
      <h3 class="fw-bold">Entrez votre code</h3>
      <p class="text-muted">Code envoyé à <strong>{{ email }}</strong></p>
    </div>

    <form method="POST">{% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-medium text-center d-block">Code à 6 chiffres</label>
        <input type="text" name="code" class="form-control form-control-lg text-center fw-bold"
               maxlength="6" minlength="6" pattern="\d{6}"
               placeholder="• • • • • •"
               style="font-size:2rem;letter-spacing:.5rem"
               required autofocus inputmode="numeric">
        <div class="text-center mt-2">
          <small class="text-muted">
            <i class="bi bi-clock me-1"></i>Expire dans 10 minutes
          </small>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-check-circle me-2"></i>Vérifier le code
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'password_reset_request' %}" class="text-muted small">
        <i class="bi bi-arrow-clockwise me-1"></i>Renvoyer un nouveau code
      </a>
    </div>
  </div>
</div>
</div>
</div>
</div>
{% endblock %}
