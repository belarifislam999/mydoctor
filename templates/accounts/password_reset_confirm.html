{% extends 'base.html' %}
{% block title %}My Doctor — Nouveau mot de passe{% endblock %}
{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center" style="min-height:80vh">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">
  <div class="auth-card card border-0 shadow-sm p-4">
    <div class="text-center mb-4">
      <div class="auth-icon mb-3">
        <i class="bi bi-key fs-1 text-success"></i>
      </div>
      <h3 class="fw-bold">Nouveau mot de passe</h3>
      <p class="text-muted">Choisissez un mot de passe sécurisé (min. 6 caractères)</p>
    </div>

    <form method="POST">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-medium">Nouveau mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-primary"></i></span>
          <input type="password" name="password1" id="p1"
                 class="form-control" minlength="6" required>
          <button class="btn btn-outline-secondary" type="button"
                  onclick="togglePass('p1',this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Confirmer le mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
          <input type="password" name="password2" id="p2"
                 class="form-control" minlength="6" required>
          <button class="btn btn-outline-secondary" type="button"
                  onclick="togglePass('p2',this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
        <i class="bi bi-check-circle me-2"></i>Enregistrer le nouveau mot de passe
      </button>
    </form>
  </div>
</div>
</div>
</div>
</div>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
